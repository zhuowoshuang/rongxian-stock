services:
  # FastAPI 后端
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:///./stock_agent.db
      MOCK_DATA: "true"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-changeme-generate-a-real-secret}
      PYTHONUNBUFFERED: "1"
    volumes:
      - backend-data:/app
    command: >
      sh -c "python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  # Next.js 前端
  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  backend-data:
